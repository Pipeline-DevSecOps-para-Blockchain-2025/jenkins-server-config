## template: jinja
#cloud-config

# see https://wiki.archlinux.org/title/Arch_Linux_on_a_VPS#Hetzner_Cloud
# and https://community.hetzner.com/tutorials/basic-cloud-config
vendor_data:
  enabled: false

hostname: '{{ v1.local_hostname }}'

resolv_conf:
  options:
    edns0: true
    trust-ad: true

packages:
  - git

# https://docs.cloud-init.io/en/latest/reference/modules.html#ansible
ansible:
  install_method: distro
  package_name: ansible
  pull:
    - url: '{{ ds.meta_data.ansible_pull_url | default("https://github.com/Pipeline-DevSecOps-para-Blockchain-2025/jenkins-server-config.git") }}'
      playbook_names: [playbooks/devsecops-server.yaml]
      connection: local
      tags: all

reporting:
  logs:
    type: log
    level: INFO
  stdout:
    type: print
