- name: Setup DevSecOps server
  hosts: all
  roles:
    - role: dnf
      when: "'fedora' in group_names"
    - role: firewalld
    - role: unprivileged_user
    - role: nginx
    - role: sshd
    - role: certbot
      when: configure_tls
    - role: interactive_tools
    - role: podman
    - role: jenkins
    - role: grafana
