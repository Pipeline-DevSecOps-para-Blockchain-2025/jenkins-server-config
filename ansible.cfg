[defaults]
inventory = hosts
remote_tmp = $HOME/.ansible/tmp
remote_user = runner
nocows = 1
roles_path = roles
retry_files_enabled = False
max_diff_size = 250000
stdout_callback = debug
interpreter_python = /usr/bin/python

[privilege_escalation]
become_allow_same_user = False

[ssh_connection]
pipelining = True
retries = 5
