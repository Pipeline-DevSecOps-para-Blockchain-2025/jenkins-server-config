    groups: [wheel]
    shell: /usr/bin/bash
    lock_passwd: false # allow password locally
    passwd: $y$jFT$gfbd6pgR7SkbmwBxM1pIp0$8AJO9OAl0b3dNLMg5HJcNOzkWCYcVezsBDkPMr3Zkm6
    ssh_authorized_keys: # prefer `-sk` (FIDO/U2F) keys
      - sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAINczWuNAtwE1eBt9quk1HmbzGdLlGDb7BBL6SgUFay8QAAAABHNzaDo= marmis@marmis-arch
      - sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAILBqGX/KZaYWuWIHBR4CQu7rgnfKYbr57fPnerlCA1FyAAAABHNzaDo= marmis@marmis-samsung
      - sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAID0FKhzEMNixWGnA2fZy7oP9yf1vbnFhTc+0jg6bbxHhAAAABHNzaDo= marmis@dev-sec-ops-tiago

package_reboot_if_required: true
package_update: true
package_upgrade: true
packages:
  - dnf-automatic
  # Server networking:
  - firewalld
  - nginx
  - certbot
  - python3-certbot-nginx
  # Local services:
  - podman
  - crun-krun
  - passt
  # Interactive tools:
  - bat
  - fd-find
  - fzf
  - du-dust
  - kitty-terminfo
  - nano
  - ncurses-term
  - ripgrep

resolv_conf:
  options:
    edns0: true
    trust-ad: true

write_files:
  - path: /etc/dnf/dnf.conf
    owner: root:root
    permissions: '0644'
    content: |
      [main]
      install_weak_deps = no
      excludepkgs = qemu-user*

  - path: /etc/dnf/automatic.conf
    owner: root:root
    permissions: '0644'
    content: |
      [commands]
      upgrade_type = default
      download_updates = yes
      apply_updates = yes

  - path: /etc/nginx/conf.d/jenkins.conf
    owner: root:root
    permissions: '0644'
    content: |
      {% set domain = "static.206.69.245.188.clients.your-server.de" -%}
      limit_req_zone $binary_remote_addr zone=jenkins_limit:10m rate=10r/s;

      server {
        listen 80;
        listen [::]:80;

        server_name {{ domain }};

        # Proxy everything to Jenkins on localhost:8080
        location / {
          limit_req zone=jenkins_limit burst=20 nodelay;

          proxy_pass        http://127.0.0.1:8080;
          proxy_set_header  Host $host;
          proxy_set_header  X-Real-IP $remote_addr;
          proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header  X-Forwarded-Proto $scheme;
          proxy_buffering   off;
        }
      }

  - path: /etc/ssh/sshd_config.d/20-authentication.conf
    owner: root:root
    permissions: '0440'
    content: |
      # Deny root access
      PermitRootLogin no

      # Enable public key
      AuthenticationMethods publickey
      PubkeyAuthentication yes

      # Disable password
      PasswordAuthentication no
      KbdInteractiveAuthentication no

  - path: /etc/ssh/sshd_config.d/50-algorithms.conf
    owner: root:root
    permissions: '0440'
    content: |
      # Recommended
      KexAlgorithms sntrup761x25519-sha512,sntrup761x25519-sha512@openssh.com,mlkem768x25519-sha256,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512,diffie-hellman-group-exchange-sha256
      HostKeyAlgorithms ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512-cert-v01@openssh.com,rsa-sha2-256-cert-v01@openssh.com,sk-ssh-ed25519@openssh.com,ssh-ed25519,rsa-sha2-512,rsa-sha2-256
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
      Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr

      # Insecure
      KexAlgorithms -ecdh-sha2-nistp*,diffie-hellman-group14-sha256
      HostKeyAlgorithms -ecdsa-sha2-nistp*,sk-ecdsa-sha2-nistp*
      MACs -hmac-sha1*,hmac-sha2-256,hmac-sha2-512,umac-64*,umac-128@openssh.com
      Ciphers -chacha20-poly1305@openssh.com

  - path: /etc/containers/containers.conf.d/99-custom.conf
    owner: root:root
    permissions: '0644'
    content: |
      [containers]
      log_driver = "journald"
      log_tag = "container/{% raw %}{{.Name}}{% endraw %}"
      dns_options = ["edns0", "trust-ad"]

      [engine]
      image_parallel_copies = 12
      compression_format = "zstd"
      compression_level = 5
      compose_warning_logs = true

  - path: /etc/profile.d/sh.local
    owner: root:root
    permissions: '0644'
    content: |
      # for interactive shells only
      if [[ $- == *i* ]]; then
        GREEN="\[$(tput setaf 2)\]"
        ORANGE="\[$(tput setaf 11)\]"
        RESET="\[$(tput sgr0)\]"
        PS1="${GREEN}[${ORANGE}\u@\h${RESET} \W${GREEN}]\$${RESET} "
        if command -v fzf > /dev/null; then
          eval "$(fzf --bash)"
        fi
        unset GREEN ORANGE RESET
      fi

runcmd:
  - [systemctl, enable, --now, dnf-automatic.timer]
  - [systemctl, enable, --now, firewalld.service]
  - [firewall-cmd, --permanent, --add-service=http]
  - [firewall-cmd, --permanent, --add-service=https]
  - [firewall-cmd, --reload]
  - [loginctl, enable-linger, runner]
  - [systemctl, enable, --now, nginx.service]
  - |
    {% if ds and ds.meta_data and ds.meta_data.notls -%}
    echo 'TLS disabled'
    {%- else -%}
    certbot run --nginx -d '{{ domain }}' --redirect --hsts --staple-ocsp -m tiagodepalves@gmail.com --agree-tos -n
    systemctl enable --now certbot-renew.timer
    {%- endif %}
    # identation guard
  - [systemctl, reload, nginx.service]
