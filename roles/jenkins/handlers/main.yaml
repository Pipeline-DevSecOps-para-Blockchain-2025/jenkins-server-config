- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: Restart jenkins
  ansible.builtin.systemd_service:
    name: jenkins
    state: restarted
    scope: user
    daemon_reload: true
  become: true
  become_user: runner
  become_method: su
  become_flags: '-l'
