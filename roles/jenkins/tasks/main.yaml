- name: Set Jenkins nginx endpoint
  ansible.builtin.template:
    src: jenkins.conf.j2
    dest: /etc/nginx/default.d/jenkins.conf
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts["user_id"] == "root"
  notify: Reload nginx

- name: Configure Jenkins
  block:
    - name: Create config directories
      ansible.builtin.file:
        path: /home/runner/.config/jenkins/{{ item }}
        state: directory
        owner: runner
        group: runner
        mode: '0700'
      loop:
        - ''
        - build

    - name: Configure Jenkins CasC
      ansible.builtin.template:
        src: jenkins.yaml.j2
        dest: /home/runner/.config/jenkins/jenkins.yaml
        owner: runner
        group: runner
        mode: '0644'
      notify: Restart Jenkins

    - name: Copy Jenkins image config
      ansible.builtin.copy:
        src: '{{ item }}'
        dest: /home/runner/.config/jenkins/{{ item }}
        owner: runner
        group: runner
        mode: '0644'
      loop:
        - build/Containerfile
        - build/plugins.txt
      notify: Restart Jenkins

- name: Set up Jenkins service
  block:
    - name: Create Jenkins Podman secrets
      containers.podman.podman_secret:
        name: '{{ item.name }}'
        data: '{{ item.value }}'
        state: present
        force: true
      become: '{{ ansible_facts["user_id"] != "runner" }}'
      become_user: runner
      become_method: su
      become_flags: -l
      loop:
        - name: github-shared-secret
          value: '{{ github_shared_secret }}'
        - name: github-client-secret
          value: '{{ github_client_secret }}'
        - name: github-pat
          value: '{{ github_pat }}'
        - name: github-app-private-key
          value: '{{ github_app_private_key }}'
      no_log: true
      notify: Restart Jenkins

    - name: Copy Jenkins quadlets
      ansible.builtin.copy:
        src: quadlets/{{ item  }}
        dest: /home/runner/.config/containers/systemd/{{ item }}
        owner: runner
        group: runner
        mode: '0600'
      loop:
        - jenkins.container
        - jenkins-home.volume
        - jenkins.build
      notify: Restart Jenkins

- name: Reload services
  meta: flush_handlers

- name: Enable and start Jenkins quadlets
  ansible.builtin.systemd_service:
    name: jenkins
    scope: user
    enabled: true
    state: started
  become: '{{ ansible_facts["user_id"] != "runner" }}'
  become_user: runner
  become_method: su
  become_flags: -l
