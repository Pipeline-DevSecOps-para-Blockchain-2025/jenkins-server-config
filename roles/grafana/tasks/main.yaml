- name: Configure grafana nginx location
  ansible.builtin.template:
    src: grafana.conf.j2
    dest: /etc/nginx/default.d/grafana.conf
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts["user_id"] == "root"
  notify: Reload nginx

- name: Create grafana config directories
  ansible.builtin.file:
    path: /home/runner/.config/grafana/provisioning/{{ item }}
    state: directory
    owner: runner
    group: runner
    mode: '0755'
  loop:
    - datasources
    - dashboards
    - plugins
    - alerting

- name: Configure grafana.ini
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: /home/runner/.config/grafana/grafana.ini
    owner: runner
    group: runner
    mode: '0644'
  notify: Restart grafana

- name: Copy VictoriaMetrics datasource
  ansible.builtin.copy:
    src: provisioning/datasources/victoriametrics.yaml
    dest: /home/runner/.config/grafana/provisioning/datasources/victoriametrics.yaml
    owner: runner
    group: runner
    mode: '0644'

- name: Copy dashboard provisioning config
  ansible.builtin.copy:
    src: provisioning/dashboards/dashboards.yaml
    dest: /home/runner/.config/grafana/provisioning/dashboards/dashboards.yaml
    owner: runner
    group: runner
    mode: '0644'
  notify: Restart grafana

- name: Create grafana dashboards directory
  ansible.builtin.file:
    path: /home/runner/.config/grafana/dashboards
    state: directory
    owner: runner
    group: runner
    mode: '0755'

- name: Copy grafana dashboards
  ansible.builtin.copy:
    src: dashboards/
    dest: /home/runner/.config/grafana/dashboards/
    owner: runner
    group: runner
    mode: '0644'
  notify: Restart grafana

- name: Create Grafana Podman secrets
  containers.podman.podman_secret:
    name: grafana-admin-password
    data: '{{ vault_grafana_admin_password }}'
    state: present
    force: true
  become: '{{ ansible_facts["user_id"] != "runner" }}'
  become_user: runner
  become_method: su
  become_flags: '-l'
  no_log: true
  notify: Restart grafana

- name: Copy VictoriaMetrics volume quadlet
  ansible.builtin.copy:
    src: quadlets/victoriametrics_data.volume
    dest: /home/runner/.config/containers/systemd/victoriametrics_data.volume
    owner: runner
    group: runner
    mode: '0600'
  notify: Restart victoriametrics

- name: Copy VictoriaMetrics container quadlet
  ansible.builtin.copy:
    src: quadlets/victoriametrics.container
    dest: /home/runner/.config/containers/systemd/victoriametrics.container
    owner: runner
    group: runner
    mode: '0600'
  notify: Restart victoriametrics

- name: Copy grafana data volume quadlet
  ansible.builtin.copy:
    src: quadlets/grafana_data.volume
    dest: /home/runner/.config/containers/systemd/grafana_data.volume
    owner: runner
    group: runner
    mode: '0600'
  notify: Restart grafana

- name: Copy grafana container quadlet
  ansible.builtin.copy:
    src: quadlets/grafana.container
    dest: /home/runner/.config/containers/systemd/grafana.container
    owner: runner
    group: runner
    mode: '0600'
  notify: Restart grafana
