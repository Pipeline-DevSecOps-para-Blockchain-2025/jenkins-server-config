- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

- name: Allow nginx to proxy to upstream services
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true

- name: Check if TLS certificate exists
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ server_domain }}/fullchain.pem
  register: tls_cert
  when: configure_tls

- name: Configure nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  vars:
    tls_ready: '{{ configure_tls and (tls_cert.stat.exists | default(false)) }}'
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
