- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

- name: Allow nginx to proxy to upstream services
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true

- name: Configure nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Start and enable nginx
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
