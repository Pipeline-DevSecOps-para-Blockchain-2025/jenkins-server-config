- name: Create users
  ansible.builtin.user:
    name: runner
    groups: [wheel]
    shell: /usr/bin/bash
    password: $y$jFT$gfbd6pgR7SkbmwBxM1pIp0$8AJO9OAl0b3dNLMg5HJcNOzkWCYcVezsBDkPMr3Zkm6
    update_password: on_create
    state: present

- name: Create .ssh directory
  ansible.builtin.file:
    path: /home/runner/.ssh
    state: directory
    owner: runner
    group: runner
    mode: '0700'

- name: Configure authorized_keys
  ansible.builtin.template:
    src: authorized_keys.j2
    dest: /home/runner/.ssh/authorized_keys
    owner: runner
    group: runner
    mode: '0600'

- name: Enable linger for users with linger enabled
  ansible.builtin.command:
    cmd: loginctl enable-linger runner
    creates: /var/lib/systemd/linger/runner

- name: Create quadlets directory
  ansible.builtin.file:
    path: /home/runner/.config/containers/systemd
    state: directory
    owner: runner
    group: runner
    mode: '0700'

- name: Copy services network quadlet
  ansible.builtin.copy:
    src: systemd/services.network
    dest: /home/runner/.config/containers/systemd/services.network
    owner: runner
    group: runner
    mode: '0600'
  notify: Reload user systemd
