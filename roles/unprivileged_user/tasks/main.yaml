- name: Create unprivileged user
  ansible.builtin.user:
    name: runner
    groups: [wheel]
    shell: /usr/bin/bash
    password: '{{ runner_password }}'
    update_password: always
    state: present

- name: Configure authorized_keys
  ansible.posix.authorized_key:
    user: runner
    exclusive: true
    key: '{{ users.values() | map(attribute="ssh_key") | join("") }}'

- name: Set up quadlets
  block:
    - name: Enable linger
      ansible.builtin.command:
        cmd: loginctl enable-linger runner
        creates: /var/lib/systemd/linger/runner

    - name: Create quadlets directory
      ansible.builtin.file:
        path: /home/runner/.config/containers/systemd
        state: directory
        owner: runner
        group: runner
        mode: '0700'

    - name: Copy services network quadlet
      ansible.builtin.copy:
        src: systemd/services.network
        dest: /home/runner/.config/containers/systemd/services.network
        owner: runner
        group: runner
        mode: '0600'
      notify: Reload user systemd
