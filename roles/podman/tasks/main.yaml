- name: Install podman
  ansible.builtin.package:
    name:
      - podman
      - crun-krun
      - passt
    state: present

- name: Create containers.conf.d directory
  ansible.builtin.file:
    path: /etc/containers/containers.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure containers
  ansible.builtin.copy:
    src: containers.conf.d/99-custom.conf
    dest: /etc/containers/containers.conf.d/99-custom.conf
    owner: root
    group: root
    mode: '0644'
