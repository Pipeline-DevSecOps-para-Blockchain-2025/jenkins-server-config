- name: Configure global dnf
  ansible.builtin.copy:
    src: dnf.conf
    dest: /etc/dnf/dnf.conf
    owner: root
    group: root
    mode: '0644'

- name: Upgrade all packages
  ansible.builtin.dnf:
    name: '*'
    state: latest
    update_cache: true

- name: Enable automatic updates
  block:
    - name: Install dnf-automatic
      ansible.builtin.dnf:
        name: dnf-automatic
        state: present

    - name: Configure dnf-automatic updates
      ansible.builtin.copy:
        src: dnf-automatic.conf
        dest: /etc/dnf/automatic.conf
        owner: root
        group: root
        mode: '0644'

    - name: Start and enable dnf-automatic timer
      ansible.builtin.systemd_service:
        name: dnf-automatic.timer
        enabled: true
        state: started
